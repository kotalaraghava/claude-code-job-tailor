# Resume Transformation Mapping Configuration
# Describes how the job-tailor agent should transform the flat source resume
# into a tailored resume.yaml for a specific company/role.

schema_version: '3.0.0'
description: 'Rules for job-tailor agent to select and adapt content from flat source resume against a job description'

# Source files
sources:
  resume: 'resume-data/sources/resume.yaml'
  professional_experience: 'resume-data/sources/professional_experience.yaml'
  cover_letter: 'resume-data/sources/cover_letter.yaml'

# How the agent should approach tailoring
approach: |
  1. Read the job description and job_analysis.yaml for the target company
  2. Read the flat source files — do not pre-filter or pre-bucket anything
  3. For each section, select the most relevant content based on the job requirements
  4. Write a tailored title and summary specific to the role — do not copy verbatim from source
  5. Output a valid resume.yaml in the company tailor folder

# Section-by-section guidance
sections:

  title:
    source: 'personal_info.title'
    action: 'rewrite'
    guidance: |
      Use the source title as a base. Rewrite to match the seniority and domain
      of the target role. Keep it under 80 characters.

  summary:
    source: 'personal_info.summary'
    action: 'rewrite'
    guidance: |
      Use the source summary as a base. Rewrite to emphasize the 2-3 aspects most
      relevant to the job description. Keep it between 100-400 characters.
      Lead with the candidate's strongest match to the role requirements.

  technical_expertise:
    source: 'skills (ai, backend, devops, leadership)'
    action: 'select and categorize'
    guidance: |
      1. Read all skills from the source (ai, backend, devops, leadership groups)
      2. Select skills most relevant to the job description
      3. Group into 3-4 categories with short resume_title labels
      4. Do not invent skills not present in the source

  professional_experience:
    source: 'professional_experience.yaml'
    action: 'select achievements'
    guidance: |
      1. Include all roles (preserving chronological order)
      2. For each role, select up to 4 achievements most relevant to the job description
      3. Do not rewrite or embellish achievements — use exact wording from source
      4. For roles with only 1-2 achievements in source, include all of them

  cover_letter:
    source: 'cover_letter.yaml personal_info'
    action: 'generate'
    guidance: |
      Generate a 3-paragraph cover letter tailored to the specific role and company.
      Use the candidate's real achievements from professional_experience as evidence.
      Do not use placeholder text like [COMPANY] or [POSITION] — fill them in.

# Output constraints
output:
  max_achievements_per_role: 4
  max_technical_categories: 4
  title_max_length: 80
  summary_min_length: 100
  summary_max_length: 400
  no_fabrication: true  # All content must exist in source files
