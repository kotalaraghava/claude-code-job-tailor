      opening_line: 'Dear [COMPANY] Hiring Team,'
      body:
        - "I am writing to apply for the [POSITION] role at [COMPANY]. As an Engineering Associate Manager with 10 years of experience building and leading teams delivering Gen AI systems in production, I am confident in my ability to drive technical excellence and team growth at [COMPANY]."
        - "At Accenture, I recruited, grew, and managed a team of 4+ engineers while owning technical direction for an Agentic AI Orchestrator and Seller Copilot platform impacting 10,000+ enterprise customers. I led architecture decisions, ran structured 1:1s, managed performance, and delivered cross-functional projects — all while remaining deeply involved in hands-on technical work."
        - "I am drawn to [COMPANY]'s mission of [mention specific goal or value]. I believe my combination of engineering depth — Python, FastAPI, LlamaIndex, Azure — and proven people leadership makes me well-suited to help your team scale effectively."
      signature: |
        Sincerely,
        Kotala Raghavendra

