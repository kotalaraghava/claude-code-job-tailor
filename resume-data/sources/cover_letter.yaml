cover_letter:
  templates:
    ai_focused:
      letter_title: 'Cover Letter — AI Engineering Manager'
      opening_line: 'Dear [COMPANY] Hiring Team,'
      body:
        - "I am writing to express my strong interest in the [POSITION] role at [COMPANY]. With 10 years of experience building and leading Gen AI systems in production, I am excited by the opportunity to contribute to your AI initiatives."
        - "At Accenture, I architected a LlamaIndex-based agentic orchestrator that was adopted by 4 teams, built a hybrid RAG pipeline enabling enterprise sellers to query 5,000+ documents with 90% faster retrieval, and integrated advanced prompt engineering to drive measurable business outcomes — including a 50% increase in deal velocity for 10,000+ customers."
        - "I am particularly drawn to [COMPANY]'s focus on [mention specific AI initiative or product]. My hands-on experience shipping production-grade AI systems — from agentic orchestration and RAG to LLM prompt design and Azure deployments — positions me to make an immediate impact on your team."
      signature: |
        Sincerely,
        Kotala Raghavendra

    engineering_manager_focused:
