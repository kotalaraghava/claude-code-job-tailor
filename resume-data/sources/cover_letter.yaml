        - "I am excited by [COMPANY]'s engineering culture and the opportunity to contribute strong Python and backend foundations alongside my applied Gen AI experience. I look forward to discussing how I can support your team's goals."
      signature: |
        Sincerely,
        Kotala Raghavendra

